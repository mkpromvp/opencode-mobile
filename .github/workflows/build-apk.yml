name: Build APK

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Configure Android SDK
        run: |
          echo "ANDROID_HOME=/usr/local/lib/android/sdk" >> $GITHUB_ENV
          echo "ANDROID_SDK_ROOT=/usr/local/lib/android/sdk" >> $GITHUB_ENV
          SDKMANAGER=$(find /usr/local/lib/android/sdk -name sdkmanager -type f 2>/dev/null | head -1)
          if [ -z "$SDKMANAGER" ]; then
            echo "sdkmanager not found, installing..."
            curl -sS https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip -o /tmp/cmdline-tools.zip
            unzip -q /tmp/cmdline-tools.zip -d /tmp/cmdline-tools-tmp
            mkdir -p /tmp/android/cmdline-tools/latest
            mv /tmp/cmdline-tools-tmp/cmdline-tools/* /tmp/android/cmdline-tools/latest/
            SDKMANAGER=/tmp/android/cmdline-tools/latest/bin/sdkmanager
            echo "ANDROID_HOME=/tmp/android" >> $GITHUB_ENV
            echo "ANDROID_SDK_ROOT=/tmp/android" >> $GITHUB_ENV
          fi
          echo "Using sdkmanager: $SDKMANAGER"
          yes | $SDKMANAGER --licenses || true
          $SDKMANAGER --install "platform-tools" "build-tools;35.0.0" "platforms;android-35"
        shell: bash

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/libs.versions.toml') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Generate Gradle Wrapper
        run: |
          if [ ! -f gradlew ]; then
            gradle wrapper --gradle-version=8.10
          fi
          chmod +x gradlew

      - name: Build Debug APK
        run: ./gradlew assembleDebug

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: opencode-mobile-debug
          path: app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
